<div class="p-4 space-y-4">

  <div class="flex items-center gap-3">
    <a routerLink="/grammar" class="text-slate-400">←</a>
    <h2 class="text-xl font-bold text-slate-800">{{ level }} Seviyesi</h2>
  </div>

  @if (loading) {
    <div class="space-y-3">
      @for (i of [1,2,3]; track i) {
        <div class="bg-white rounded-xl h-20 animate-pulse"></div>
      }
    </div>
  } @else if (lessons.length === 0) {
    <div class="text-center py-16 text-slate-400">
      <p class="text-4xl mb-3">📭</p>
      <p>Bu seviyede henüz ders yok.</p>
    </div>
  } @else {
    <div class="space-y-3">
      @for (lesson of lessons; track lesson.id) {
        <a [routerLink]="['/grammar', level, lesson.id]"
           class="flex items-center justify-between bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow">
          <div>
            <p class="font-semibold text-slate-800">{{ lesson.title }}</p>
            <p class="text-xs text-slate-400 mt-0.5">{{ lesson.category }}</p>
          </div>
          <span class="text-slate-300 text-lg">›</span>
        </a>
      }
    </div>
  }

</div>
