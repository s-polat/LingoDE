<div class="p-4 pb-8 space-y-5">

  <div>
    <h2 class="text-xl font-bold text-slate-800">Gramer</h2>
    <p class="text-xs text-slate-400 mt-0.5">Dersler ve alıştırma trainer'ları</p>
  </div>

  <!-- Gramer Dersleri -->
  <div>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">Gramer Dersleri</p>
    <div class="grid grid-cols-3 gap-3">
      @for (level of levels; track level) {
        <a [routerLink]="level"
           class="flex items-center justify-center h-16 bg-white rounded-xl shadow font-bold text-primary-600 hover:bg-primary-50 transition-colors">
          {{ level }}
        </a>
      }
    </div>
  </div>

  <!-- Gramer Trainer'ları -->
  <div>
    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">Trainer'lar</p>
    <div class="space-y-3">
      @for (tool of trainers; track tool.path) {
        <a [routerLink]="tool.path"
           class="flex items-center gap-3 bg-white rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow">
          <span class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" [class]="tool.color">
            {{ tool.emoji }}
          </span>
          <div class="min-w-0">
            <p class="font-semibold text-slate-800 text-sm">{{ tool.title }}</p>
            <p class="text-xs text-slate-400 mt-0.5">{{ tool.desc }}</p>
          </div>
          <svg class="w-4 h-4 text-slate-300 flex-shrink-0 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </a>
      }
    </div>
  </div>

</div>
