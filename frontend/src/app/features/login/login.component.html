<div class="min-h-screen flex flex-col items-center justify-center p-6"
     style="background: linear-gradient(135deg, #c084fc 0%, #7e22ce 45%, #3b0764 100%);">

  <div class="w-full max-w-sm space-y-8">
    <!-- Logo + başlık -->
    <div class="flex flex-col items-center gap-4">
      <img src="icons/icon-192x192.png" alt="LingoDe"
           class="w-24 h-24 rounded-3xl"
           style="box-shadow: 0 0 40px rgba(167,139,250,0.6), 0 8px 32px rgba(0,0,0,0.4);">
      <div class="text-center">
        <h1 class="text-3xl font-bold text-white tracking-tight">LingoDe</h1>
        <p class="text-violet-300 text-sm mt-1 tracking-wide">Meister dein Deutsch</p>
      </div>
    </div>

    <!-- Giriş kartı -->
    <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-6 space-y-4 border border-white/20">
      <p class="text-white/80 text-sm text-center">Devam etmek için Google hesabınla giriş yap</p>

      @if (error()) {
        <p class="text-red-300 text-xs text-center bg-red-500/20 rounded-lg px-3 py-2">{{ error() }}</p>
      }

      <button (click)="login()"
              [disabled]="loading()"
              class="w-full flex items-center justify-center gap-3 bg-white rounded-xl py-3 px-4 font-semibold text-slate-700 transition-all hover:shadow-lg active:scale-95"
              [class.opacity-70]="loading()">
        @if (loading()) {
          <div class="w-5 h-5 border-2 border-slate-300 border-t-violet-600 rounded-full animate-spin"></div>
          <span>Giriş yapılıyor…</span>
        } @else {
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          <span>Google ile Giriş Yap</span>
        }
      </button>
    </div>
  </div>
</div>
