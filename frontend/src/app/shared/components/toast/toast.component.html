<div class="fixed bottom-20 left-0 right-0 max-w-lg mx-auto px-4 z-50 space-y-2 pointer-events-none">
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
    <div class="flex items-center gap-3 rounded-xl px-4 py-3 text-white shadow-lg pointer-events-auto"
         [class]="bgClass(toast.type)"
         style="animation: slideUp 0.2s ease-out;">
      <span class="text-sm font-bold flex-shrink-0">{{ icon(toast.type) }}</span>
      <p class="text-sm flex-1">{{ toast.message }}</p>
      <button (click)="toastService.dismiss(toast.id)"
              class="flex-shrink-0 opacity-70 hover:opacity-100 text-lg leading-none">×</button>
    </div>
  }
</div>

<style>
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
